<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Media Encoding Suite</title>
    <!-- Google Fonts for Material 3 (Roboto and Material Symbols) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet" />
    <!-- Local CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="app-container">
        
        <!-- Header -->
        <header class="top-app-bar">
            <div class="title-wrapper">
                <span class="material-symbols-rounded logo-icon">movie_edit</span>
                <h1>Media Encoding Suite</h1>
            </div>
            <p class="subtitle">Enterprise-Grade Archival Encoding Pipeline</p>
        </header>

        <main class="main-content">
            
            <!-- Controls Card -->
            <section class="card controls-card">
                <h2 class="card-title">Configure Batch Job</h2>
                
                <form id="encodeForm" class="form-layout">
                    
                    <!-- Encoder Selection -->
                    <div class="input-field select-field">
                        <label for="encoder">Encoder Engine</label>
                        <div class="select-wrapper">
                            <span class="material-symbols-rounded field-icon">memory</span>
                            <select id="encoder" name="encoder">
                                <option value="hardware">Hardware Acceleration (HEVC VideoToolbox)</option>
                                <option value="software_hevc">Software Encoding (HEVC libx265)</option>
                                <option value="software_av1">Next-Generation Compression (SVT-AV1)</option>
                            </select>
                            <span class="material-symbols-rounded dropdown-icon">arrow_drop_down</span>
                        </div>
                    </div>

                    <!-- Paths -->
                    <div class="input-group">
                        <div class="input-field">
                            <label for="inputPath">Input Target</label>
                            <div class="text-input-wrapper with-button">
                                <span class="material-symbols-rounded field-icon">folder_open</span>
                                <input type="text" id="inputPath" name="inputPath" placeholder="Select a file or folder..." required>
                                <button type="button" class="md-icon-button" onclick="browsePath('inputPath', 'file')">
                                    <span class="material-symbols-rounded">search</span>
                                </button>
                                <button type="button" class="md-icon-button" onclick="browsePath('inputPath', 'folder')" title="Select Folder">
                                    <span class="material-symbols-rounded">snippet_folder</span>
                                </button>
                            </div>
                        </div>

                        <div class="input-field">
                            <label for="outputPath">Output Directory (Optional)</label>
                            <div class="text-input-wrapper with-button">
                                <span class="material-symbols-rounded field-icon">save_as</span>
                                <input type="text" id="outputPath" name="outputPath" placeholder="Leave empty for default directory">
                                <button type="button" class="md-icon-button" onclick="browsePath('outputPath', 'folder')">
                                    <span class="material-symbols-rounded">search</span>
                                </button>
                            </div>
                        </div>
                    </div>

                    <!-- Tracks -->
                    <div class="input-group track-group">
                        <div class="input-field select-field">
                            <label for="audioIdx">Audio Track Index (Optional)</label>
                            <div class="select-wrapper">
                                <span class="material-symbols-rounded field-icon">audio_file</span>
                                <select id="audioIdx" name="audioIdx">
                                    <option value="">Keep All Audio Tracks</option>
                                </select>
                                <span class="material-symbols-rounded dropdown-icon">arrow_drop_down</span>
                            </div>
                        </div>

                        <div class="input-field select-field">
                            <label for="subIdx">Subtitle Track Index (Optional)</label>
                            <div class="select-wrapper">
                                <span class="material-symbols-rounded field-icon">subtitles</span>
                                <select id="subIdx" name="subIdx">
                                    <option value="">Keep All Subtitle Tracks</option>
                                </select>
                                <span class="material-symbols-rounded dropdown-icon">arrow_drop_down</span>
                            </div>
                        </div>
                    </div>

                    <!-- Submit -->
                    <div class="actions">
                        <button type="submit" id="startBtn" class="md-fab-primary">
                            <span class="material-symbols-rounded">play_arrow</span>
                            Start Encode
                        </button>
                        <button type="button" id="pauseBtn" class="md-fab-warning" style="display:none;">
                            <span class="material-symbols-rounded">pause</span>
                            Pause
                        </button>
                        <button type="button" id="resumeBtn" class="md-fab-success" style="display:none;">
                            <span class="material-symbols-rounded">play_circle</span>
                            Resume
                        </button>
                        <button type="button" id="stopBtn" class="md-fab-error" style="display:none;">
                            <span class="material-symbols-rounded">stop</span>
                            Stop Encode
                        </button>
                    </div>

                </form>
            </section>

            <!-- Live Terminal Card -->
            <section class="card terminal-card">
                <div class="terminal-header">
                    <span class="material-symbols-rounded">terminal</span>
                    <h2>Execution Log</h2>
                    <div class="status-indicator" id="statusIndicator">Ready</div>
                </div>
                <div class="progress-bar-container" style="display: none;" id="progressContainer">
                    <div class="progress-bar-fill" id="progressBar"></div>
                    <span class="progress-text" id="progressText">0%</span>
                </div>
                <div class="terminal-window" id="terminalOutput">
                    <div class="log-line welcome-log">Waiting for job to start...</div>
                </div>
            </section>

        </main>
    </div>

    <!-- Local JS -->
    <script src="{{ url_for('static', filename='app.js') }}"></script>
</body>
</html>
