<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Media Encoding Suite</title>
    <!-- Local CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="tracker-container">
        
        <!-- Header -->
        <header class="tracker-header">
            <div class="logo-area">
                <!-- Custom Minimalist Anime Cat/Mascot SVG -->
                <svg class="tracker-logo" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                    <path d="M 20 80 L 20 40 L 10 20 L 35 35 C 45 30, 55 30, 65 35 L 90 20 L 80 40 L 80 80 Z" fill="none" stroke="#2B4A7A" stroke-width="6" stroke-linejoin="round"/>
                    <circle cx="35" cy="55" r="4" fill="#2B4A7A"/>
                    <circle cx="65" cy="55" r="4" fill="#2B4A7A"/>
                    <path d="M 45 65 L 50 70 L 55 65" fill="none" stroke="#2B4A7A" stroke-width="4" stroke-linecap="round"/>
                </svg>
                <div class="title-text">
                    <h1>Media Encoding Suite</h1>
                    <span class="subtitle">Archival Engine v1.0.3</span>
                </div>
            </div>
            <div class="nav-links">
                <a href="#">Home</a> | <a href="#">Stats</a> | <a href="#">Wiki</a> | <a href="#">Forums</a>
            </div>
        </header>

        <main class="main-content">
            
            <!-- Controls Box -->
            <section class="content-box">
                <div class="box-header">
                    <h2>Job Configuration</h2>
                </div>
                <div class="box-body">
                    <form id="encodeForm" class="tabular-form">
                        
                        <table class="form-table">
                            <tbody>
                                <tr>
                                    <td class="label-cell"><label for="encoder">Encoding Engine:</label></td>
                                    <td class="input-cell">
                                        <select id="encoder" name="encoder" class="tracker-select">
                                            <option value="hardware">Hardware Acceleration (HEVC VideoToolbox)</option>
                                            <option value="software_hevc">Software Encoding (HEVC libx265)</option>
                                            <option value="software_av1">Next-Generation Compression (SVT-AV1)</option>
                                        </select>
                                    </td>
                                </tr>

                                <tr>
                                    <td class="label-cell"><label for="inputPath">Target Path:</label></td>
                                    <td class="input-cell flex-cell">
                                        <input type="text" id="inputPath" name="inputPath" class="tracker-input" placeholder="Select a file or folder..." required>
                                        <button type="button" class="btn btn-small" onclick="browsePath('inputPath', 'file')">File...</button>
                                        <button type="button" class="btn btn-small" onclick="browsePath('inputPath', 'folder')">Folder...</button>
                                    </td>
                                </tr>

                                <tr>
                                    <td class="label-cell"><label for="outputPath">Output Path:</label></td>
                                    <td class="input-cell flex-cell">
                                        <input type="text" id="outputPath" name="outputPath" class="tracker-input" placeholder="(Optional) Default directory">
                                        <button type="button" class="btn btn-small" onclick="browsePath('outputPath', 'folder')">Dir...</button>
                                    </td>
                                </tr>

                                <tr>
                                    <td class="label-cell"><label for="audioIdx">Audio Track:</label></td>
                                    <td class="input-cell">
                                        <select id="audioIdx" name="audioIdx" class="tracker-select">
                                            <option value="">Keep All Audio Tracks</option>
                                        </select>
                                    </td>
                                </tr>

                                <tr>
                                    <td class="label-cell"><label for="subIdx">Subtitle Track:</label></td>
                                    <td class="input-cell">
                                        <select id="subIdx" name="subIdx" class="tracker-select">
                                            <option value="">Keep All Subtitle Tracks</option>
                                        </select>
                                    </td>
                                </tr>
                            </tbody>
                        </table>

                        <div class="actions-row">
                            <button type="submit" id="startBtn" class="btn btn-primary">Start Encode</button>
                            <button type="button" id="pauseBtn" class="btn btn-warning" style="display:none;">Pause</button>
                            <button type="button" id="resumeBtn" class="btn btn-success" style="display:none;">Resume</button>
                            <button type="button" id="stopBtn" class="btn btn-danger" style="display:none;">Stop</button>
                        </div>
                    </form>
                </div>
            </section>

            <!-- Terminal Box -->
            <section class="content-box">
                <div class="box-header flex-header">
                    <h2>Execution Log</h2>
                    <span class="status-badge" id="statusIndicator">Idle</span>
                </div>
                
                <div class="progress-bar-container" style="display: none;" id="progressContainer">
                    <div class="progress-bar-fill" id="progressBar"></div>
                    <span class="progress-text" id="progressText">0%</span>
                </div>

                <div class="terminal-window" id="terminalOutput">
                    <div class="log-line">System ready. Awaiting job...</div>
                </div>
            </section>

        </main>

        <footer class="tracker-footer">
            Media Encoding Suite - Tracker Edition v1.0
        </footer>
    </div>

    <!-- Local JS -->
    <script src="{{ url_for('static', filename='app.js') }}"></script>
</body>
</html>
